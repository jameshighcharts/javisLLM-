apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: easy-llm-benchmarker-worker-secrets
spec:
  refreshInterval: 1h
  target:
    name: easy-llm-benchmarker-worker-secrets
    creationPolicy: Owner
  data:
    - secretKey: SUPABASE_URL
      remoteRef:
        key: marketing/easy-llm-benchmarker/SUPABASE_URL
    - secretKey: SUPABASE_SERVICE_ROLE_KEY
      remoteRef:
        key: marketing/easy-llm-benchmarker/SUPABASE_SERVICE_ROLE_KEY
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: marketing/easy-llm-benchmarker/OPENAI_API_KEY
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: marketing/easy-llm-benchmarker/ANTHROPIC_API_KEY
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: marketing/easy-llm-benchmarker/GEMINI_API_KEY
