apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: easy-llm-benchmarker
spec:
  virtualhost:
    fqdn: easy-llm-benchmarker.highdev.dev
    tls:
      secretName: easy-llm-benchmarker-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: easy-llm-benchmarker-tls
spec:
  dnsNames:
    - easy-llm-benchmarker.highdev.dev
